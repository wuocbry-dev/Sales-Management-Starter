spring.application.name=sales-management-backend

# Default profile for local development
spring.profiles.default=dev

# Import DB configuration from /resources/db based on active profile
# e.g. application-dev.properties, application-prod.properties
#
# NOTE: When you don't explicitly set spring.profiles.active, Spring uses spring.profiles.default
# but spring.profiles.active remains empty. We must provide a default here, otherwise datasource
# won't be configured and Spring will fall back to embedded H2.
spring.config.import=optional:classpath:db/application-${spring.profiles.active:dev}.properties

# JWT config (dev defaults). Override via environment variables in production.
app.jwt.secret=${APP_JWT_SECRET:dev-secret-change-me-dev-secret-change-me}
app.jwt.access-token-ttl-seconds=${APP_JWT_ACCESS_TOKEN_TTL_SECONDS:86400}

# RBAC seed (OFF by default). Enable explicitly when you want to initialize roles/permissions.
app.seed.rbac.enabled=${APP_SEED_RBAC_ENABLED:false}

